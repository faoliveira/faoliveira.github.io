# Site wide configuration

title: Felipe Oliveira
locale: pt_BR
encoding: utf-8
description: Pedaços de textos, conversas e outras minúcias por @faoliveira
logo: drawing.png
paginate: 7
url: http://faoliveira.me
baseurl: /
domain_name: 'http://faoliveira.me'

# Jekyll configuration

markdown:    kramdown
highlighter: rouge
gems: 
    - jekyll-paginate
    - jekyll-feed
    - jekyll-sitemap
kramdown:
  input: GFM
  auto_ids: true
  footnote_nr: 1
  entity_output: as_char
  toc_levels: 1..2
  enable_coderay: false

mathjax: true

sass:
    style: compressed

exclude: ["lib", "config.rb", "Capfile", "config", "log", "Rakefile", "Rakefile.rb", "tmp", ".less", "*.sublime-project", "*.sublime-workspace", "test", "spec", "Gruntfile.js", "package.json", "node_modules", "Gemfile", "Gemfile.lock", "LICENSE", "README.md", "vendor"]


pre-commit:
  parallel: false
  commands:
    lint:
      glob: "*.{js,jsx,ts,tsx,mjs,cjs,svelte,astro,json,jsonc,css}"
      run: bunx biome check --write --staged
    knip:
      run: bunx knip --no-exit-code
    loc-guard:
      run: bash scripts/loc-guard.sh
    typecheck:
      run: bunx astro sync && bun run check
    impeccable:
      run: yes | npx impeccable detect --fast src/
